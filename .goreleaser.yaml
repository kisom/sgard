version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/sgard
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{- if .Arm }}v{{ .Arm }}{{ end }}_v{{ .Version }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: kisom
    name: sgard
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
