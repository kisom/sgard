version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sgard
    main: ./cmd/sgard
    binary: sgard
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: sgardd
    main: ./cmd/sgardd
    binary: sgardd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: >-
      {{ .Binary }}_{{ .Os }}_{{ .Arch }}{{- if .Arm }}v{{ .Arm }}{{ end }}_v{{ .Version }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: kisom
    name: sgard
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
