syntax = 'proto3';
package sgardpb;

import 'header.proto';
import "google/protobuf/timestamp.proto";

enum PathType {
	PATHTYPE_UNSPECIFIED = 0;
	PATHTYPE_FILE = 1;
	PATHTYPE_DIRECTORY = 2;
	PATHTYPE_LINK = 3;
};

message FilePath {
	Header header = 1;

	string source_path = 2;
	string dest_path = 3;
	// todo: add mode, action (e.g. copy vs link)
};


message Source {
	Header header = 1;
	PathType path_type = 2;

	oneof path {
		FilePath file = 5;
	};
};

